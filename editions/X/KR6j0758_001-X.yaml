body:
  text: 念大悲呪畢洒淨釋迦如來如來說經教主孔如來如來降臨法會阿難陀尊者尊者同垂加護切以旃檀林內六銖價重於娑婆給孤園中一炷通津於靈鷲古盤旋清瑞氣玉爐繚遶碧祥雲我今熱處獻如來唯願慈悲哀納受仰啟聖中聖主天中天王世出世間名稱普聞拔循環救苦之慈父濟業海利樂之導師應願似空谷傳聲赴感若春回大聲五天調御三界世雄降臨道場作乎明證通情念本師釋迦牟尼佛孔海會佛菩薩䒶龍八部降吉祥摩訶般若波羅蜜蓋聞孔明王經者經名孔說佛姥之因緣呪說毒蛇救眾生之患難所求所請隨願隨心飲食鋪排各香花供養各生歡喜咸听加持真言演處四百四病盡消除密語宣時萬禍萬殃俱殄滅天神地神水神藥叉神稽首歸依山王龍王河王大仙傾心敬仰羅又女不能為害藥叉將總願垂祥灾星變作福星惡曜化為吉曜公私口舌似氷消厭魅蠱毒而霧散在官者清平吉利居家者福壽康寧若老若少保安康是男是女皆慶明王威力週遍河沙嘆莫能窮讚揚難盡欲開大部靈文先稱七佛嘉號尊眾毋勞隨言後和孔明王佛大孔明王佛金耀孔明王佛佛姥大孔明王佛明王佛明王佛雪山南面金耀佛姥大孔明王佛出靈鷲山人天敬仰遊鹿野苑轉大法輪仰讚洪慈俯垂明證茲辰誦經開啟有意敷陳大圓鏡中諒垂昭鑒茲據入意即日沐手然香拜于雪山教主孔能仁願展金眸鑒茲微懇吉於年月日請命僧眾于家供佛作證演念佛姆大孔明王尊經加持經文神呪稱揚萬德洪名所集功德先伸回向廣大真如實際莊嚴無工佛果菩提工酧佛祖之深恩次答龍天之厚德祝扶當生本命星官照臨吉威乾像惟願等一真慈同納功德共降禎祥所冀向去身安壽求福集灾消在佛光中吉祥如意上來開啟情悃如斯仰勞尊眾不倦慈悲振鈴讀誦佛姆大孔明王經前啟請法入經畢舉如意輪王菩薩摩訶薩至滿怛囉莎縛賀舉一切天神咸集會因緣自性所出生所有種種微妙花香燈塗果供養奉獻上師三寶尊惟願慈悲哀納受戶唵薩哩縛怛佗誐哆唵布瑟畢度畢阿盧計頞底儞尾底捨不達布㘃𡄣迦三摩怛囉薩普囉曩三摩耶吽奉香華自在明王佛結界持國天王降吉祥東方世界主持國大天王統領彥達嚩結成瑜伽界南方世界主增長大天王統領矩畔拏結成灌頂界西方世界主廣目大天王統領大龍主結成蓮華界北方世界主多聞大天王統領藥叉主結成羯磨界中方世界主大梵大天王統領人天眾結成瑜伽界東方世界主佛號阿閦尊流演妙伽陀結成金剛界南方世界主佛號寶生尊流演妙伽陀結成蓮華界北方世界主佛號成就尊流演妙伽陀結成羯磨界中方世界主佛號毗盧尊流演妙伽陀結成瑜伽界奉請東方阿閦佛其身青色放光明手印執持降魔杵眾等志心歸命禮今將密語遶香壇憑此結成金剛界奉請南方寶生佛其身赤色放光明手印執持摩尼寶眾等志心歸命禮今將密語遶香壇憑此結成灌頂界奉請西方彌陀佛其身白色放光明手印執持妙蓮花眾等志心歸命禮今將密語遶香壇憑此結成蓮華界奉請北方成就佛其身黑色放光明手印執持妙降魔眾等志心歸命禮今將密語遶香壇憑此結成羯磨界奉請中方毗盧佛其身黃色放光明手印執持千輻輪眾等志心歸命禮今將密語遶香壇憑此結成瑜伽界集福迎祥幢幡為寶蓋振動金鈴殄滅諸阿閦持國寶生增長妖恠彌陀佛如來慈悲甚廣大廣目天王來成就多聞毗盧大梵結蓮華界金剛灌頂羯磨瑜伽天阿蘇來藥叉等摩訶摩瑜利金耀界云云來听法者應志心南無大摩訶摩瑜利孔明王佛云云上卷圓滿保平安南無大孔明王佛歸命禮真如沒䭾耶中卷藥叉奉藥叉聖眾降吉祥掛金索戒定真香焚氣衝天上施主虔誠爇在金爐放頃刻氛氤即遍滿十方昔日耶輸免難除灾障寄生草香纔爇爐焚寶中旃檀況乳真堪供祥雲繚遶蓮華動十方諸佛下天宮清涼山羅漢來受人間供明王佛揭句寸那神藥叉將波吒黎手處藥叉神䟦阿囉𭇧哆藥叉王住窣吐奴邑賢善大藥叉住於世囉城清江引牛首旃檀香供養裊裊祥雲起透上九霄中結成香雲蓋唯願慈悲哀納受浪淘沙沉乳共旃檀馥郁馨香金爐纔熱遍十方昔日耶輸曾免難火內除殃七懺悔求哀懺悔明王佛三千界內慈悲主百億洲中大法王咸開慧目鑒凡情眾生有求皆感應讚嘆三寶恭請證明我為今辰演經信泊家眷等目茲演經問去各人身中所有病苦云云願早安痊能離病苦明王佛佛住真如法界內無相無形離諸垢眾生觀見種種身一切恐怖皆遠離能除恐怖恐怖恐怖悉皆遠離解結解結解冤結解了多生冤和業冤家債生兩相逢相逢相遇相歡悅冤家冤家各相歡喜解冤釋結明王經力不思議救度眾生無盡期施主志心歸命禮不饒益事皆饒益不饒益事廣大饒益廣大饒益四八端嚴微妙相僧祇三大刧修來面如滿月目如蓮天上人間咸恭敬毒藥毒藥化為甘露化為甘露䒶上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者佗人厭禱悉皆消滅能離厭禱一障二語三毒罪四重五逆六根𠎝七遮八難罪消容九結十纏皆懺悔懺除罪業五言偈頂中紅肉髻如日映青山眉間白玉毫似月臨滄海稽首天中天降誕毗藍園分手指天地七步躡紅蓮海印澄三昧慈光照十方弘施十二願故號法中王菩薩清涼月猶如碧鏡空眾生心水淨菩薩影現中百刧千生罪一念蕩消除似大焚枯草滅盡無有餘四言佛真法身猶若虗空應物現形如水月中大圓滿覺應跡西乾心包太虗量週沙界佛法僧寶眾生福田凡在禱祈必彰感應常住三寶體徧十方隨眾生心感而應現佛功德山惟高惟聳法智慧海最廣最深羅剎女羅剎女眾降吉祥羅剎女眾降吉祥羅剎女眾降大吉祥羅剎女眾降吉祥消灾障羅利女眾降大吉祥四平聲龍王聖眾降吉祥佛世尊龍王龍樹王梵天龍王大龍王帝釋龍王消障灾𦦨摩龍王保安康蜜峯採華佛世尊龍王梵天龍王龍樹王菩薩𦦨摩龍王大海龍王南無龍樹王菩薩清江引天阿蘇來藥叉等來听法者應志心孔明王經請佛作證明大慈大悲救苦救難千手千眼水月光中普陀岩畔一葉扁舟白衣妙相紫竹林中風波浪內隨心滿願金字經天阿蘇囉藥叉等來听法者應志心孔明王經大慈大悲觀世音消灾障唵嚤呢叭𠺗吽採茶聲天阿蘇囉藥叉等來听法者應志心孔明王明王佛消灾延壽保平安中卷圓滿保平安同前至七佛微鉢尸如來降吉祥巍巍大法王毫光照大千八風吹不動一朵紫金蓮尸棄如來同前相好真金色無邊淨法身素容登寶座海藏月當天毗舍浮如來世界慈悲主塵沙大法王所求皆遂願慧目鑒凡情揭句忖如來身色如金山端嚴甚微妙如淨琉璃中內現真金像揭諾迦牟尼容顏甚奇妙光明照十方我適曾供養今復還親覲迦攝波如來聖主天中王迦陵頻伽聲哀愍眾生者我等今敬禮我釋迦如來願以此功德普及於一切我等與眾生皆共成佛道七佛河王浪淘沙伽河王信度河王嚩芻河王嚩芻大河王枲多河王消灾障沒臈婆河王妙高山王唵嚤吽雪山王唵嚤呢吽香醉山王唵嚤呢叭𡄣吽百峯山王戶唵嚤呢叭𡄣吽星宿入清江引宿宿有有二十八南無東方阿閦佛南方號寶生西方無量等北方成就尊南無中方毗盧佛星宿刧千佛七宿星官垂加護南無大熾盛光王佛仰啟消灾熾盛光領諸星宿下天堂二十八宿分左右十二宮辰列兩行東門七宿中天星斗與南辰列耀森羅及眾真能發志心求懺悔灾殃殄滅福駢臻南門七宿銀河湛湛蟾光照慧日騰騰燦太虗福海滔滔如淵濟壽山隱隱等須彌西門七宿太陽星斗太阥真金木水火土德君紫炁羅睺并月孛流年運限及生辰北門七宿角亢底房心尾箕斗牛女虗危室壁奎婁胃昴畢觜參井鬼柳星張翼軫二十八宿阿難陀佛妙難量三卷真詮廣敷揚二十八宿添壽筭十二宮辰保安康九曜官星萬像森羅除灾障滿天星斗降禎祥檀信演經從此去壽山高聳福綿長滿天星斗一句神仙侶二句五通神仙侶三句五通得道神仙侶四句大五通得道神仙侶到毒藥一句毒藥二句毒藥神三句大毒藥四句藥王藥上二菩薩三寶入清江引稽首歸依佛天宮坐寶臺有情思渴仰早願下生來歸命禮真如沒䭾耶稽首歸依法三明共六通河沙經藏開總持心印順無去無亦來海藏稽首歸依僧三明共六通靈山親授記三會願相逢福田稽首僧三寶眾生良福田若能歸向者獲福廣無邊佛法僧三寶摩訶摩瑜利佛母明王經我今歸命禮罪滅福源增摩訶摩瑜利天阿蘇囉藥叉等唵吽來吽法者唵吽應志心吽唵嚤呢吽一報天地二報日月三報國王四報爺娘願消三障以上因緣摩訶般若孔明王佛三卷圓滿保平安南無大孔明王佛浙江嘉興府桐鄉縣僧會司下青鎮寶閣禪寺稟佛報恩沙門慧日捐貲請續抄寫孔尊經六部功德工荐考姜公玭王氏仗此經功早生工品者嘉靖三十年季月日抄白
